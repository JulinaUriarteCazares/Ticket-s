<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago confirmado</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/purchase.css">
  <style>
    body {
      background: #f4efe3;
    }
    .purchase-main {
      width: min(1120px, calc(100% - 20px));
      margin: 22px auto 64px;
    }
    .purchase-success-card {
      max-height: none;
    }
    .payment-meta-strip {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .payment-meta-strip div {
      border: 1px solid #e5ddcd;
      border-radius: 10px;
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 2px;
    }
    .payment-meta-strip span {
      font-size: 12px;
      color: #6c6372;
    }
    .payment-meta-strip strong {
      color: #1f2430;
    }
    .payment-status-pill {
      display: inline-flex;
      width: fit-content;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: #fff1c9;
      color: #8b5c00;
    }
    .payment-status-pill.is-paid {
      background: #dff5e3;
      color: #0f5f31;
    }
    .payment-summary-list {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 4px;
      color: #1f2430;
    }
    .payment-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .payment-actions button,
    .payment-actions a {
      border: 1px solid #d0c7b6;
      background: #f3eee3;
      color: #1f2430;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }
    @media (max-width: 760px) {
      .payment-meta-strip {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand brand-link" href="/" aria-label="Ir al inicio">
      <div class="brand-mark">T</div>
      <span>Ticket's</span>
    </a>
    <div class="topbar-right">
      <div class="topbar-actions">
        <a class="auth-mini secondary" href="/">Inicio</a>
      </div>
    </div>
  </header>

  <main class="purchase-main">
    <section class="purchase-success-card">
      <span id="paymentStatusBadge" class="payment-status-pill">Procesando pago</span>
      <h2>Tu compra fue exitosa</h2>
      <p id="purchaseSuccessDetail">Estamos verificando tu compra.</p>

      <div class="payment-meta-strip">
        <div>
          <span>Total</span>
          <strong id="paymentTotal">$0.00</strong>
        </div>
        <div>
          <span>Estado</span>
          <strong id="paymentStatusText">Pendiente</strong>
        </div>
      </div>

      <div id="purchaseTicketsWrap" class="purchase-tickets-wrap hidden">
        <div class="section-title-row purchase-ticket-head">
          <div>
            <h2>Boletos generados</h2>
            <p class="ticket-summary">Descarga tus boletos con su QR.</p>
          </div>
          <div class="section-title-actions">
            <button id="downloadAllPaidTickets" class="image-btn hidden" type="button">Descargar todos</button>
          </div>
        </div>
        <div id="purchaseTicketsGrid" class="purchase-tickets-grid"></div>
      </div>

      <div id="purchaseSuccessSummary" class="purchase-success-summary">
        <h3>Resumen de tu compra</h3>
        <ul id="paymentItems" class="payment-summary-list">
          <li>Cargando detalle de pago...</li>
        </ul>
        <p class="purchase-success-total">Total pagado: <strong id="paymentTotalInline">$0.00</strong></p>
      </div>

      <div class="payment-actions">
        <button id="closePurchaseSuccess" type="button">Continuar</button>
      </div>
    </section>
  </main>

  <template id="ticketCardTemplate">
    <article class="generated-ticket">
      <div class="generated-ticket-poster">
        <img class="generated-ticket-image" src="" alt="Boleto">
      </div>
      <div class="generated-ticket-content">
        <p class="generated-ticket-kicker">Ticket's</p>
        <h3 class="ticket-event-name"></h3>
        <p class="generated-ticket-subtitle ticket-event-subtitle"></p>
        <p class="generated-ticket-description ticket-event-artist"></p>
        <div class="generated-ticket-meta">
          <div><span>Tipo</span><strong class="ticket-type-name"></strong></div>
          <div><span>Asiento</span><strong class="ticket-seat-number"></strong></div>
          <div><span>Precio</span><strong class="ticket-price"></strong></div>
          <div><span>Estado</span><strong class="ticket-status">Confirmado</strong></div>
        </div>
      </div>
      <div class="generated-ticket-qr">
        <div class="generated-ticket-qr-box qr-container"></div>
        <p>Escanea para validar</p>
        <div class="generated-ticket-actions">
          <button type="button" class="download-single">Descargar</button>
        </div>
      </div>
    </article>
  </template>

  <script src="/payment-success.js"></script>
</body>
</html>
